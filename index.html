<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla Periódica 3D - Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Menú de navegación inferior -->
    <div id="menu">
        <button id="table">TABLE</button>
        <button id="sphere">SPHERE</button>
        <button id="helix">HELIX</button>
        <button id="grid">GRID</button>
    </div>

    <!-- Contenedor del mundo 3D -->
    <div id="container"></div>

    <!-- Panel Lateral de Información -->
    <div id="info-panel" class="hidden">
        <button id="close-panel">&times;</button>
        <div id="panel-content">
            <h1 id="panel-symbol">H</h1>
            <h2 id="panel-name">Hydrogen</h2>
            <hr>
            <div class="data-row">
                <strong>Atomic Mass:</strong> 
                <span id="panel-mass">1.00794</span>
            </div>
            <div class="data-row">
                <strong>Category:</strong> 
                <span id="panel-type">Non-metal</span>
            </div>
            <p id="panel-desc">Explore las propiedades atómicas y la configuración electrónica de este elemento dentro de la estructura tridimensional.</p>
        </div>
    </div>

    <!-- Script principal -->
    <script type="module" src="script.js"></script>
</body>
</html>
